<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#3f5f3f">

  <title>Preview Booking</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/preview.css">
</head>

<body>

<div class="container">

  <div class="card">

    <!-- 🌿 TITLE -->
    <h2 class="main-title">
  <span>🌿</span> UDAIPUR WILDLIFE SANCTUARY
</h2>
<p class="subtitle">Preview Booking</p>

    <!-- 🎫 TICKET -->
    <div class="section ticket-box">
      <h3>🎫 Ticket Details</h3>
      <div id="ticketDetails"></div>
    </div>

    <!-- 💰 TOTAL -->
    <div class="total-box">
      <h2 id="totalAmount">TOTAL ₹0</h2>
    </div>

    <!-- 👤 USER -->
    <div class="section visitor-box">
      <h3>👤 Visitor Details</h3>
      <div class="info-box" id="name"></div>
<div class="info-box" id="mobile"></div>
<div class="info-box" id="gmail"></div>
    </div>

<div class="warning-box">
  ⚠ Tickets are non-cancellable and non-refundable
</div>

    <!-- ☑ TERMS -->
    <div class="terms-box">
      <input type="checkbox" id="terms">
      <label for="terms">I accept Terms & Conditions</label>
    </div>

    <!-- 🔘 BUTTON -->
    <div class="btn-group">
      <button class="back-btn" onclick="goBack()">Back To Edit</button>
      <button class="confirm-btn" onclick="confirmBooking()">Payment Now</button>
    </div>

  </div>

</div>

<!-- JS -->
<script src="js/preview.js"></script>

</body>
</html>
