<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Udaipur Wildlife Sanctuary</title>

<!-- 🔥 FONT LINK -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">

<div class="logo">
<img src="images/logo/logo.svg" class="logo-img">
<span>UDAIPUR WILDLIFE SANCTUARY</span>
</div>

<div class="menu">
<svg class="menu-icon" viewBox="0 0 40 40" fill="none"
stroke="#3f5f3f" stroke-width="3"
stroke-linecap="round" stroke-linejoin="round">
<line x1="8" y1="12" x2="32" y2="12"/>
<line x1="8" y1="20" x2="32" y2="20"/>
<line x1="8" y1="28" x2="32" y2="28"/>
</svg>
</div>

</header>

<!-- ================= HERO ================= -->

<section class="hero">

  <!-- 🔥 TOP CONTROLS (ALL SAME SIZE) -->
<div class="hero-controls">

  <!-- LEFT SIDE -->
  <div class="left-controls">
    <div class="ctrl-btn">हिंदी</div>
    <div class="ctrl-btn">English</div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="ctrl-btn menu-btn">
    <!-- SVG -->
    <svg viewBox="0 0 32 32" class="menu-svg">
      <circle cx="10" cy="10" r="5" fill="#ffffff"/>
      <path d="M2 26c0-5 4-8 8-8s8 3 8 8" fill="#ffffff"/>
      <circle cx="24" cy="8" r="2" fill="#ffffff"/>
      <circle cx="24" cy="14" r="2" fill="#ffffff"/>
      <circle cx="24" cy="20" r="2" fill="#ffffff"/>
    </svg>

    <span>MENU</span>
  </div>

</div>

  <!-- HERO CONTENT -->
  <div class="hero-overlay">

    <h1>
      Explore Udaipur <br>
      Wildlife Sanctuary
    </h1>

    <!-- BOOK BUTTON -->
    <div class="ticket-btn">

      <svg viewBox="0 0 320 70">

        <defs>

          <linearGradient id="forestGreen" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4f7a2a"/>
            <stop offset="50%" stop-color="#2f5a18"/>
            <stop offset="100%" stop-color="#1b3a0f"/>
          </linearGradient>

          <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f5d27a"/>
            <stop offset="100%" stop-color="#caa84a"/>
          </linearGradient>

        </defs>

        <rect x="2" y="2" width="316" height="66" rx="20"
        fill="#3f5f3f"/>

        <text x="150" y="44"
        text-anchor="middle"
        font-size="28"
        font-weight="900"
        fill="#ffffff">
        BOOK TICKET
        </text>

        <polygon points="270,26 295,35 270,44"
        fill="#ffffff"/>

      </svg>

    </div>

  </div>

</section>

<!-- ================= SERVICES ================= -->
<section class="services">

<div class="card">
<img src="images/cards/boating.jpg">
<h3>Boating Zone</h3>

<div class="explore-btn">
<svg viewBox="0 0 180 44">
<rect x="1" y="1" width="178" height="42" rx="12" fill="#3f5f3f"/>
<text x="80" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">
Explore Now
</text>
<polygon points="148,17 160,22 148,27" fill="#ffffff"/>
</svg>
</div>

</div>

<div class="card">
<img src="images/cards/museum.jpg">
<h3>Vany Pradi Dirgha</h3>

<div class="explore-btn">
<svg viewBox="0 0 180 44">
<rect x="1" y="1" width="178" height="42" rx="12" fill="#3f5f3f"/>
<text x="80" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">
Explore Now
</text>
<polygon points="148,17 160,22 148,27" fill="#ffffff"/>
</svg>
</div>

</div>

<div class="card">
<img src="images/cards/ekart.jpg">
<h3>E-Kart</h3>

<div class="explore-btn">
<svg viewBox="0 0 180 44">
<rect x="1" y="1" width="178" height="42" rx="12" fill="#3f5f3f"/>
<text x="80" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">
Explore Now
</text>
<polygon points="148,17 160,22 148,27" fill="#ffffff"/>
</svg>
</div>

</div>

</section>

<!-- ================= TICKET ================= -->
<section class="ticket">

<div class="ticket-title">
<h2>Udaipur Wildlife Sanctuary</h2>
</div>

<p class="ticket-sub">-----ONLINE ENTRY TICKET-----</p>

<button class="btn-main">
BOOK TICKET
</button>

</section>

<!-- ================= ATTRACTIONS ================= -->
<section class="services">

<div class="card">
<img src="images/attractions/interpre.jpg">
<h3>Interpretation Centre</h3>

<div class="explore-btn">
<svg viewBox="0 0 180 44">
<rect x="1" y="1" width="178" height="42" rx="12" fill="#3f5f3f"/>
<text x="80" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">
Explore Now
</text>
<polygon points="148,17 160,22 148,27" fill="#ffffff"/>
</svg>
</div>

</div>

<div class="card">
<img src="images/attractions/butterfly.jpg">
<h3>Butterfly Garden</h3>

<div class="explore-btn">
<svg viewBox="0 0 180 44">
<rect x="1" y="1" width="178" height="42" rx="12" fill="#3f5f3f"/>
<text x="80" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">
Explore Now
</text>
<polygon points="148,17 160,22 148,27" fill="#ffffff"/>
</svg>
</div>

</div>

<div class="card">
<img src="images/attractions/bird.jpg">
<h3>Bird Watching Station</h3>

<div class="explore-btn">
<svg viewBox="0 0 180 44">
<rect x="1" y="1" width="178" height="42" rx="12" fill="#3f5f3f"/>
<text x="80" y="27" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">
Explore Now
</text>
<polygon points="148,17 160,22 148,27" fill="#ffffff"/>
</svg>
</div>

</div>

</section>

</body>
</html>
