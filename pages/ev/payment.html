<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5f2eea">

<title>Payment</title>

<link rel="stylesheet" href="../../css/ev/payment.css">

</head>

<body>

<header class="header">Payment</header>

<div class="container">

  <!-- TITLE -->
  <div class="card center">
    <h2>UDAIPUR WILDLIFE SANCTUARY</h2>
    <p class="sub">EV Cart Payment</p>
  </div>

  <!-- AMOUNT -->
  <div class="card center amount-card">
    <h3>Amount to Pay</h3>
    <div class="amount" id="amount">₹0</div>
  </div>

  <!-- QR -->
  <div class="card center">
    <h3>Scan & Pay</h3>

    <img src="../../images/qr.png" class="qr">

    <p class="small">Scan using PhonePe / GPay / Paytm</p>
  </div>

  <!-- USER -->
  <div class="card">
    <h3>Booking Details</h3>

    <div class="info" id="name"></div>
    <div class="info" id="mobile"></div>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    Processing Payment...
  </div>

</div>

<!-- BUTTON -->
<div class="btn-group">
  <button onclick="goBack()">Back</button>
  <button onclick="payNow()">Pay Now</button>
</div>

<script src="../../js/ev/payment.js"></script>

</body>
</html>
