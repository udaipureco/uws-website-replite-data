<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3f5f3f">

<title>Preview Booking</title>

<link rel="stylesheet" href="../../css/ev/preview.css">

</head>

<body>

<!-- HEADER -->
<header class="header">
  <span>Preview Booking</span>
</header>

<!-- MAIN CONTAINER -->
<div class="container">

  <!-- 🔥 TITLE BOX -->
  <section class="card center title-card">
    <h2>UDAIPUR WILDLIFE SANCTUARY</h2>
    <p class="sub">EV Cart Ticket Preview</p>
  </section>

  <!-- 📅 DATE -->
  <section class="card">
    <h3>📅 Visit Date</h3>
    <div class="info highlight" id="dateBox">--</div>
  </section>

  <!-- 🎫 TICKET -->
  <section class="card">
    <h3>🎫 Ticket Details</h3>

    <div id="ticketDetails">
      <!-- dynamic -->
    </div>

    <div class="total" id="totalAmount">
      TOTAL ₹0
    </div>
  </section>

  <!-- 👤 VISITOR -->
  <section class="card">
    <h3>👤 Visitor Details</h3>

    <div class="info" id="name">Name: --</div>
    <div class="info" id="mobile">Mobile: --</div>
    <div class="info" id="gmail">Gmail: --</div>
  </section>

  <!-- ⚠️ WARNING -->
  <section class="card warning">
    ⚠️ Tickets are non-cancellable and non-refundable
  </section>

  <!-- ✅ TERMS -->
  <section class="card check">
    <label class="check-label">
      <input type="checkbox" id="agree">
      <span>I accept Terms & Conditions</span>
    </label>
  </section>

</div>

<!-- 🔻 BUTTON FIXED -->
<div class="btn-group">
  <button class="back-btn" onclick="goBack()">Back To Edit</button>
  <button class="pay-btn" onclick="goPayment()">Payment Now</button>
</div>

<script src="../../js/ev/preview.js"></script>

</body>
</html>
