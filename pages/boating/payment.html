<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- MOBILE TOP BAR COLOR -->
<meta name="theme-color" content="#3f5f3f">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<link rel="stylesheet" href="../../css/boating/payment.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <h2 class="title">PhonePe</h2>
  <p class="subtitle">Secure Payment</p>

  <!-- AMOUNT -->
  <div class="card center">
    <p>Total Amount</p>
    <h1 id="amount">₹0</h1>
  </div>

  <!-- UPI -->
  <div class="card center">
    <p>Pay to</p>
    <h3>udaipur@upi</h3>

    <img src="../../images/qr.png" class="qr">

    <p class="small">Scan & Pay</p>
  </div>

  <!-- BUTTON -->
  <div class="btn-group">
    <button onclick="goBack()">Back</button>
    <button id="payBtn" onclick="payNow()">Pay Now</button>
  </div>

  <!-- LOADING -->
  <div id="loading" class="loading">Processing Payment...</div>

</div>

<script src="../../js/boating/payment.js"></script>
</body>
</html>
