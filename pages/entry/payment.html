<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#5f259f">

<title>PhonePe Payment</title>

<link rel="stylesheet" href="../../css/entry/payment.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>PhonePe</h2>
    <p>Secure Payment</p>
  </div>

  <!-- CARD -->
  <div class="card">

    <h3>Pay Securely</h3>

    <!-- AMOUNT -->
    <div class="amount-box">
      <span>Total Amount</span>
      <h1 id="amount">₹0</h1>
    </div>

    <!-- UPI -->
    <div class="upi-box">
      <p>Pay to</p>
      <strong>udaipur@upi</strong>
    </div>

    <!-- QR -->
    <div class="qr-box">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=udaipur@upi" alt="QR">
      <p>Scan & Pay</p>
    </div>

    <!-- BUTTON -->
    <button onclick="payNow()" id="payBtn">Pay Now</button>

    <!-- LOADING -->
    <div class="loading" id="loading">
      Processing Payment...
    </div>

  </div>

</div>

<script src="../../js/entry/payment.js"></script>

</body>
</html>
