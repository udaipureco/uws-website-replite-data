<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint - UWS</title>
<meta name="theme-color" content="#3f5f3f">
<link rel="stylesheet" href="../../css/complaint/complaint.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="hero">
  <h1>Complaint</h1>
</div>

<div class="form-container">
  <div class="form-box">
    <label>Full Name*</label>
    <input type="text" placeholder="Full Name">
    <label>Mobile Number*</label>
    <input type="number" placeholder="Mobile Number">
    <label>Email*</label>
    <input type="email" placeholder="Email">
    <label>Complaint Category*</label>
    <select>
      <option>Select Category</option>
      <option>Staff Behavior</option>
      <option>Cleanliness</option>
      <option>Ticket Issue</option>
      <option>Parking Issue</option>
      <option>Other</option>
    </select>
    <label>Complaint Details*</label>
    <textarea placeholder="Write your complaint..."></textarea>
    <label>Upload Photo / Video (Optional)</label>
    <input type="file" accept="image/*,video/*" multiple class="file-upload">
    <div class="captcha-box">
      <span class="code">62547</span>
      <input type="text" placeholder="Enter Code">
    </div>
    <button class="submit-btn">Submit Complaint</button>
  </div>
  <div class="info-box">
    <h3>Complaint Information</h3>
    <p>All fields are required</p>
    <p>Complaints reviewed by Forest Department</p>
    <p>For emergency call 112</p>
  </div>
</div>

<script src="/js/header-loader.js"></script>
</body>
</html>
