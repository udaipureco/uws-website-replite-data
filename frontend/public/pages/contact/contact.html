<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#3f5f3f">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link rel="stylesheet" href="../../css/contact/contact.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="contact-wrapper">
  <div class="contact-card">
    <h1>Contact Us</h1>
    <p class="subtitle">Reach out to Udaipur Wildlife Sanctuary team</p>
    <div class="info">
      <p><b>Address</b><br>Udaipur, Bettiah, Bihar</p>
      <p><b>Email</b><br>support@udaipurwildlife.in</p>
      <p><b>Phone</b><br>+91 9000000000</p>
    </div>
    <h2>Get in Touch</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="tel" id="phone" placeholder="Phone Number">
    <textarea id="message" placeholder="Your Message"></textarea>
    <button onclick="sendMessage()">SEND MESSAGE</button>
  </div>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/contact/contact.js"></script>
</body>
</html>
