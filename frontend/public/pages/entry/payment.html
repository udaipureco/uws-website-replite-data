<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5f259f">
<title>PhonePe Payment</title>
<link rel="stylesheet" href="../../css/entry/payment.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="container">
  <div class="card">
    <h3>Pay Securely</h3>
    <div class="amount-box">
      <span>Total Amount</span>
      <h1 id="amount">&#8377;0</h1>
    </div>
    <div class="upi-box">
      <p>Pay to</p>
      <strong>udaipur@upi</strong>
    </div>
    <div class="qr-box">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=udaipur@upi" alt="QR">
      <p>Scan & Pay</p>
    </div>
    <button onclick="payNow()" id="payBtn">Pay Now</button>
    <div class="loading" id="loading">Processing Payment...</div>
  </div>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/entry/payment.js"></script>
</body>
</html>
