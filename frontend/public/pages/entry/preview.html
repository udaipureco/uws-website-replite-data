<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3f5f3f">
<title>Preview Booking</title>
<link rel="stylesheet" href="../../css/entry/preview.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="container">
  <div class="card">
    <h2 class="main-title"><span>&#127807;</span> UDAIPUR WILDLIFE SANCTUARY</h2>
    <p class="subtitle">Preview Booking</p>
    <div class="section ticket-box">
      <h3>Ticket Details</h3>
      <div id="ticketDetails"></div>
    </div>
    <div class="total-box">
      <h2 id="totalAmount">TOTAL &#8377;0</h2>
    </div>
    <div class="section visitor-box">
      <h3>Visitor Details</h3>
      <div class="info-box" id="name">Name: -</div>
      <div class="info-box" id="mobile">Mobile: -</div>
      <div class="info-box" id="gmail">Gmail: -</div>
    </div>
    <div class="warning-box">Tickets are non-cancellable and non-refundable</div>
    <div class="terms-box">
      <input type="checkbox" id="terms">
      <label for="terms">I accept Terms & Conditions</label>
    </div>
    <div class="btn-group">
      <button class="back-btn" onclick="goBack()">Back To Edit</button>
      <button class="confirm-btn" onclick="confirmBooking()">Payment Now</button>
    </div>
  </div>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/entry/preview.js"></script>
</body>
</html>
