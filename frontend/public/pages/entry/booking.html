<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3f5f3f">
<title>Entry Booking</title>
<link rel="stylesheet" href="../../css/entry/booking.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="container">

<div class="top-header">
  <div class="title-box">
    <h1>UDAIPUR WILDLIFE SANCTUARY</h1>
    <p>Entry Ticket Booking</p>
  </div>
  <button class="back-btn" onclick="goHome()">&#11013; BACK TO HOME</button>
</div>

<div class="box">
  <h3>Visit Date</h3>
  <p class="note">NOTE: Monday Closed</p>
  <input type="text" id="date" readonly>
  <p class="time">9 AM - 5 PM</p>
  <p class="time">Last Booking: 4:30 PM</p>
</div>

<div class="box">
  <h3>Select Tickets</h3>
  <div class="ticket-row">
    <span>Adult &#8377;10</span>
    <div class="qty">
      <button onclick="changeQty('adult',-1)">-</button>
      <input type="number" id="adult" value="0" min="0">
      <button onclick="changeQty('adult',1)">+</button>
    </div>
  </div>
  <div class="ticket-row">
    <span>Child &#8377;5</span>
    <div class="qty">
      <button onclick="changeQty('child',-1)">-</button>
      <input type="number" id="child" value="0" min="0">
      <button onclick="changeQty('child',1)">+</button>
    </div>
  </div>
</div>

<div class="box total-box">
  <h3>TOTAL SUMMARY</h3>
  <div id="summary" class="summary-list"></div>
  <div class="final-total">TOTAL &#8377;0</div>
</div>

<div class="form-group">
  <label>Full Name</label>
  <input type="text" id="name" placeholder="Enter Name">
  <p class="input-note">Note: Enter only head of family name</p>
</div>
<div class="form-group">
  <label>Mobile Number</label>
  <input type="tel" id="mobile" placeholder="Enter Mobile Number">
</div>
<div class="form-group">
  <label>Gmail ID</label>
  <input type="email" id="gmail" placeholder="Enter Gmail">
  <p class="input-note">Note: Enter valid Gmail ID (ticket will be sent here)</p>
</div>

<div class="bottom">
  <button onclick="goHome()">Home</button>
  <button onclick="nextStep()">NEXT</button>
</div>

</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/entry/booking.js"></script>
</body>
</html>
