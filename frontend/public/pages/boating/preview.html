<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview Booking</title>
<link rel="stylesheet" href="../../css/boating/preview.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="container">
  <h2 class="title">UDAIPUR WILDLIFE SANCTUARY</h2>
  <p class="subtitle">Preview Booking</p>
  <div class="card">
    <h3>Visit Date</h3>
    <p id="visitDate"></p>
  </div>
  <div class="card">
    <h3>Ticket Details</h3>
    <div id="ticketBox"></div>
    <div class="total" id="totalAmount">TOTAL &#8377;0</div>
  </div>
  <div class="card">
    <h3>Visitor Details</h3>
    <div class="info" id="nameBox"></div>
    <div class="info" id="mobileBox"></div>
    <div class="info" id="gmailBox"></div>
  </div>
  <div class="card small">Tickets are non-cancellable and non-refundable</div>
  <div class="card small">
    <label><input type="checkbox" id="agree"> I accept Terms & Conditions</label>
  </div>
  <div class="btn-group">
    <button onclick="goBack()">Back To Edit</button>
    <button onclick="goPayment()">Payment Now</button>
  </div>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/boating/preview.js"></script>
</body>
</html>
