<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boating Booking</title>
<meta name="theme-color" content="#3f5f3f">
<link rel="stylesheet" href="../../css/boating/booking.css">
</head>
<body>

<div id="headerContainer"></div>

<section class="card">
  <h2 class="main-title">UDAIPUR WILDLIFE SANCTUARY</h2>
  <p class="sub-title">Boating Ticket Booking</p>
  <h3>Visit Date</h3>
  <input type="text" id="date" readonly>
  <p class="time">9 AM - 5 PM</p>
</section>

<section class="card">
  <h3>Select Boat</h3>
  <div class="boat-item">
    <span>Motor Boat &#8377;100</span>
    <div class="qty-box">
      <button onclick="changeQty('motor', -1)">-</button>
      <input type="number" id="motor" value="0">
      <button onclick="changeQty('motor', 1)">+</button>
    </div>
  </div>
  <div class="boat-item">
    <span>Shikara Boat &#8377;100</span>
    <div class="qty-box">
      <button onclick="changeQty('shikara', -1)">-</button>
      <input type="number" id="shikara" value="0">
      <button onclick="changeQty('shikara', 1)">+</button>
    </div>
  </div>
  <div class="boat-item">
    <span>Paddle Boat &#8377;50</span>
    <div class="qty-box">
      <button onclick="changeQty('paddle', -1)">-</button>
      <input type="number" id="paddle" value="0">
      <button onclick="changeQty('paddle', 1)">+</button>
    </div>
  </div>
  <h3 style="margin-top:12px;">Total</h3>
  <div id="summaryBox">No boats selected</div>
  <div class="total" id="totalAmount">TOTAL &#8377;0</div>
</section>

<section class="card">
  <h3>Visitor Details</h3>
  <label>Full Name</label>
  <input type="text" id="name" placeholder="Enter Name">
  <small>Enter only head of family name</small>
  <label>Mobile Number</label>
  <input type="number" id="mobile" placeholder="Enter Mobile Number">
  <label>Gmail ID</label>
  <input type="email" id="gmail" placeholder="Enter Gmail">
  <small>Ticket will be sent here</small>
</section>

<div class="btn-group">
  <button onclick="goHome()">Home</button>
  <button onclick="nextStep()">Next</button>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/boating/booking.js"></script>
</body>
</html>
