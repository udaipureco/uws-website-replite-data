<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6a11cb">
<title>Booking Success</title>
<link rel="stylesheet" href="../../css/ev/success.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="container">
  <div class="success-top">
    <h2>Booking Successful</h2>
    <p>Your ticket has been generated</p>
  </div>
  <div class="ticket-card">
    <h3 class="title">UDAIPUR WILDLIFE SANCTUARY</h3>
    <p class="subtitle">EV Cart Entry Ticket</p>
    <div class="row"><span>Date</span><span id="date"></span></div>
    <div class="row"><span>Booking ID</span><span id="bookingId"></span></div>
    <hr>
    <div id="ticketList"></div>
    <h2 class="total" id="total"></h2>
    <hr>
    <div class="row"><span>Name</span><span id="name"></span></div>
    <div class="row"><span>Mobile</span><span id="mobile"></span></div>
  </div>
</div>

<div class="btn-group">
  <button class="home" onclick="goHome()">Home</button>
  <button class="download" onclick="downloadTicket()">Download</button>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/ev/success.js"></script>
</body>
</html>
