<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3f5f3f">
<title>EV Cart Booking</title>
<link rel="stylesheet" href="../../css/ev/booking.css">
</head>
<body>

<div id="headerContainer"></div>

<section class="card">
  <h2 class="main-title">UDAIPUR WILDLIFE SANCTUARY</h2>
  <p class="sub-title">EV Cart Ticket</p>
  <h3>Visit Date</h3>
  <input type="text" id="date" readonly>
</section>

<section class="card">
  <h3>Select EV Cart</h3>
  <div class="boat-item">
    <span>EV Cart &#8377;20</span>
    <div class="qty-box">
      <button onclick="changeQty(-1)">-</button>
      <input type="number" id="ev" value="0">
      <button onclick="changeQty(1)">+</button>
    </div>
  </div>
  <h3>Summary</h3>
  <div id="summary">No EV selected</div>
  <div class="total" id="total">TOTAL &#8377;0</div>
</section>

<section class="card">
  <h3>Visitor Details</h3>
  <label>Full Name</label>
  <input type="text" id="name" placeholder="Enter Name">
  <small>Enter only head of family name</small>
  <label>Mobile Number</label>
  <input type="tel" id="mobile" placeholder="Enter Mobile Number">
  <label>Gmail ID</label>
  <input type="email" id="gmail" placeholder="Enter Gmail">
  <small>Ticket will be sent here</small>
</section>

<div class="btn-group">
  <button onclick="goHome()">Home</button>
  <button onclick="nextStep()">Next</button>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/ev/booking.js"></script>
</body>
</html>
