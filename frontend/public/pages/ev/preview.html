<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3f5f3f">
<title>Preview Booking</title>
<link rel="stylesheet" href="../../css/ev/preview.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="container">
  <section class="card center title-card">
    <h2>UDAIPUR WILDLIFE SANCTUARY</h2>
    <p class="sub">EV Cart Ticket Preview</p>
  </section>
  <section class="card">
    <h3>Visit Date</h3>
    <div class="info highlight" id="dateBox">--</div>
  </section>
  <section class="card">
    <h3>Ticket Details</h3>
    <div id="ticketDetails"></div>
    <div class="total" id="totalAmount">TOTAL &#8377;0</div>
  </section>
  <section class="card">
    <h3>Visitor Details</h3>
    <div class="info" id="name">Name: --</div>
    <div class="info" id="mobile">Mobile: --</div>
    <div class="info" id="gmail">Gmail: --</div>
  </section>
  <section class="card warning">Tickets are non-cancellable and non-refundable</section>
  <section class="card check">
    <label class="check-label">
      <input type="checkbox" id="agree">
      <span>I accept Terms & Conditions</span>
    </label>
  </section>
</div>

<div class="btn-group">
  <button class="back-btn" onclick="goBack()">Back To Edit</button>
  <button class="pay-btn" onclick="goPayment()">Payment Now</button>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/ev/preview.js"></script>
</body>
</html>
