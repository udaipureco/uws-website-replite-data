<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#3f5f3f">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<link rel="stylesheet" href="../../css/gallery/gallery.css">
</head>
<body>

<div id="headerContainer"></div>

<section class="gallery">
  <div class="gallery-header">
    <h1 class="main-title">Photo Gallery</h1>
    <p class="sub-title">Explore the beauty of Udaipur Wildlife Sanctuary</p>
  </div>
  <div id="filterContainer" class="filter-container"></div>
  <div id="galleryContainer"></div>
</section>

<div id="lightbox" class="lightbox">
  <div class="top-bar">
    <button id="closeLightbox" class="btn close-btn">CLOSE</button>
  </div>
  <img id="lightboxImg">
  <div class="nav-bar">
    <button id="prevBtn" class="btn">PREVIOUS</button>
    <button id="nextBtn" class="btn">NEXT</button>
  </div>
  <div class="bottom-bar">
    <button id="backGallery" class="btn primary">BACK TO GALLERY</button>
  </div>
</div>

<script src="/js/header-loader.js"></script>
<script src="../../js/gallery/gallery.js"></script>
</body>
</html>
